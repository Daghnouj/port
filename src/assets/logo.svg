<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <!-- Définir des dégradés élégants -->
  <defs>
    <linearGradient id="modernGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4f46e5" />
    </filter>
  </defs>

  <!-- Fond circulaire avec gradient -->
  <circle cx="75" cy="75" r="70" fill="url(#modernGradient)" />

  <!-- Élément principal en forme de balise -->
  <path d="M50,60 L30,75 L50,90" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" />
  <path d="M100,60 L120,75 L100,90" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" />
  <rect x="60" y="60" width="30" height="30" rx="5" fill="none" stroke="#ffffff" stroke-width="4" />

  <!-- Texte au centre -->
  <text x="75" y="85" font-family="'Montserrat', sans-serif" font-size="35" font-weight="700" 
        fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    RD
  </text>
</svg>
